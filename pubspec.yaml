name: markdown_editor
description: 跨平台Markdown编辑器 - 对标Obsidian的双栏编辑体验
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Markdown 渲染
  flutter_markdown: ^0.6.18
  markdown: ^7.1.1

  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1


  # 工具
  uuid: ^4.2.1
  intl: ^0.20.2
  share_plus: ^7.2.1
  file_picker: ^6.1.1

  # 国际化
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
